[package]
name = "station"
version.workspace = true
edition = "2024"

[features]
default = []
ov5647 = ["dep:ov5647"]
yahboom-dogzilla-lite = ["dep:yahboom-dogzilla-lite", "inferences/yahboom-dogzilla-lite"]

[dependencies]
prost = { workspace = true }
normfs = { workspace = true, features = ["websocket"] }
normfs-types = "0.1.0-beta.1"
clap = { version = "4.5", features = ["derive"] }
tokio = { workspace = true }
station_iface = { path = "../../shared/station-iface" }
st3215 = { path = "../../../drivers/st3215" }
yahboom-dogzilla-lite = { path = "../../../drivers/yahboom-dogzilla-lite", optional = true }
ov5647 = { path = "../../../drivers/ov5647", optional = true }
systime = { path = "../../shared/systime-rs" }
usbvideo = { path = "../../../drivers/usbvideo" }
sysinfod = { path = "../../../drivers/sysinfod" }
motors-mirroring = { path = "../../../drivers/motors-mirroring" }
inferences = { path = "../../../drivers/inferences" }
log = { workspace = true }
env_logger = "0.10"
bytes = { workspace = true }
anyhow = "1.0"
fastwebsockets = { version = "0.10.0", features = ["upgrade"] }
hyper = { version = "1.7.0", features = ["http1", "server"] }
hyper-util = { version = "0.1.6", features = ["full"] }
http-body-util = "0.1"
rust-embed = "8.9.0"
mime_guess = "2.0.5"
parking_lot = { workspace = true }
dashmap = "6.1"

[build-dependencies]
prost-build = { workspace = true }
