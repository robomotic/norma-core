syntax = "proto3";

package drivers;

enum QueueDataType {
    QDT_SYSTEM = 0;           // queues/system.proto
    QDT_STATION_COMMANDS = 1; // commands Command
    QDT_STATION_STARTUPS  = 2; // startups.StationStartup
    QDT_INFERENCE_TAGS_RX = 3; // inference_tags.RxEnvelope

    QDT_ST3215_SERIAL_TX    = 10; // commands
    QDT_ST3215_SERIAL_RX    = 11; // states
    QDT_ST3215_META         = 12; // meta
    QDT_ST3215_INFERENCE    = 13; // inference state
    
    QDT_FFMPEG_VIDEO_STREAM_RX = 20; // FFMPEGQueueHeader
    QDT_USB_VIDEO_FRAMES       = 21;
    QDT_INFERENCE_FRAMES       = 22; // inference frames (normvla, etc)

    QDT_MOTOR_MIRRORING_MODES = 30;
    QDT_MOTOR_MIRRORING_RX    = 32;

    QDT_YAHBOOM_DOGZILLA_LITE_SERIAL_TX = 40; // yahboom_dogzilla_lite.TxEnvelope
    QDT_YAHBOOM_DOGZILLA_LITE_SERIAL_RX = 41; // yahboom_dogzilla_lite.RxEnvelope
    QDT_YAHBOOM_DOGZILLA_LITE_INFERENCE = 42; // yahboom_dogzilla_lite.InferenceState
}

enum StationCommandType {
    STC_ST3215_COMMAND          = 0; // st3215.Command
    STC_MOTOR_MIRRORING_COMMAND = 1; // motors_mirroring.Command
    STC_INFERENCE_TAG_COMMAND   = 2; // inference_tags.Command
    STC_YAHBOOM_DOGZILLA_LITE_COMMAND        = 3; // yahboom_dogzilla_lite.Command
}
